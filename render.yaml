# render.yaml
# تكوين الاستضافة لـ Render.com (Blueprint Spec)
# يساعدك على إنشاء الخدمة وضبط إعدادات البيئة بضغطة زر واحدة

services:
  - type: web
    name: sakani-backend
    runtime: docker
    dockerfilePath: apps/backend/Dockerfile
    dockerContext: apps/backend
    plan: free # استخدام الخطة المجانية تماماً
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # سيطلب منك إدخال الرابط الخاص بقاعدة بيانات Neon
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false # مفتاح التشفير المكون من 32 حرفاً
      - key: PUSHER_APP_ID
        sync: false
      - key: PUSHER_KEY
        sync: false
      - key: PUSHER_SECRET
        sync: false
      - key: PUSHER_CLUSTER
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 465
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false # سيتم إدخال رابط فرونت إند Vercel هنا لاحقاً
