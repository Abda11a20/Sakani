# render.yaml
# تكوين الاستضافة لـ Render.com (Blueprint Spec)
# لا تحذف هذا الملف — هو الرجعة الاحتياطية إذا فشل HuggingFace

services:
  - type: web
    name: sakani-backend
    runtime: docker
    dockerfilePath: apps/backend/Dockerfile.render
    dockerContext: apps/backend
    plan: free
    envVars:
      # ─── App ──────────────────────────────────────────────────────────────
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production

      # ─── Database (Neon PostgreSQL) ───────────────────────────────────────
      - key: DATABASE_URL
        sync: false

      # ─── JWT ─────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

      # ─── Encryption ───────────────────────────────────────────────────────
      - key: ENCRYPTION_KEY
        sync: false

      # ─── Frontend URL ─────────────────────────────────────────────────────
      - key: FRONTEND_URL
        sync: false

      # ─── Email (Gmail OAuth2) ─────────────────────────────────────────────
      - key: EMAIL_PROVIDER
        value: gmail
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_SENDER_EMAIL
        sync: false
      # Gmail SMTP (بديل إذا لم يكن Gmail OAuth متاحاً)
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_SECURE
        value: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false

      # ─── Storage (Cloudinary) ─────────────────────────────────────────────
      - key: STORAGE_PROVIDER
        value: cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ─── Pusher (Real-time Chat) ──────────────────────────────────────────
      - key: PUSHER_APP_ID
        sync: false
      - key: PUSHER_KEY
        sync: false
      - key: PUSHER_SECRET
        sync: false
      - key: PUSHER_CLUSTER
        sync: false

      # ─── Telegram Bot ─────────────────────────────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false  # ← سيكون رابط Render بعد أول deploy: https://sakani-backend.onrender.com

      # ─── Web Push Notifications (VAPID) ──────────────────────────────────
      # ⚠️ أضف هذه القيم يدوياً في Render Dashboard — لا تحفظها هنا أبداً
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:admin@sakani.com


      # ─── Payments (Paymob) ────────────────────────────────────────────────
      - key: SUBSCRIPTIONS_ENABLED
        value: false
      - key: PAYMOB_API_KEY
        sync: false
      - key: PAYMOB_INTEGRATION_ID
        sync: false
      - key: PAYMOB_HMAC_SECRET
        sync: false
