# .github/workflows/ci.yml
name: Sakany CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    # متغيرات البيئة للـ CI فقط — قيم وهمية لتمكين prisma generate أثناء البناء
    env:
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
      JWT_SECRET: "ci-dummy-jwt-secret-32-characters"
      JWT_REFRESH_SECRET: "ci-dummy-refresh-secret-32-chars"
      ENCRYPTION_KEY: "ci-dummy-encryption-key-32-chars"
      FRONTEND_URL: "http://localhost:3000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma Generate (Backend)
        run: npm run db:generate --workspace=backend

      - name: Run Linting
        run: npm run lint

      - name: Build Application
        run: npm run build
